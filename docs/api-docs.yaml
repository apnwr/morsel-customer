openapi: 3.0.0
info:
  title: Morsel API
  version: 1.0.0
  description: Complete Morsel Hospitality Management API — authentication, business management, staff, branches, areas, spaces,
    menus, items, ordering sessions, orders, billing, payments, secrets, discounts, and workflow.
servers:
- url: https://us-central1-morsel-db7d8.cloudfunctions.net/app/api/v1
tags:
- name: Auth
- name: Business
- name: Staff
- name: Branch
- name: Area
- name: Space
- name: Menu
- name: OrderingSession
- name: Order
- name: Ordering Session - Patron
  description: Public APIs for patrons to start sessions and participate in ordering
- name: Ordering Session - Business
  description: Business staff APIs to manage active ordering sessions
- name: Orders - Business
  description: Business order management and status tracking
- name: Menu - Public
  description: Public menu APIs to retrieve business menus and items
- name: Items - Business
  description: Business APIs to manage menu items, variants, and addons
- name: Billing - Business
  description: Business APIs for managing taxes and charges
- name: Discounts - Business
  description: Business APIs for managing discount codes and applying discounts
- name: Discounts - Patron
  description: Business APIs for managing discount codes and applying discounts
- name: Ordering Session - Staff
  description: Staff-specific APIs to manage assigned sessions
- name: Workflow - Business
  description: Business order workflow configuration and status management
paths:
  /auth/admin/register:
    post:
      tags:
      - Auth
      summary: Register super admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Super admin registered
  /auth/admin/login:
    post:
      tags:
      - Auth
      summary: Login super admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Super admin logged in
  /auth/business/register:
    post:
      tags:
      - Auth
      summary: Register business admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                displayName:
                  type: string
                businessName:
                  type: string
                businessType:
                  type: string
              required:
              - email
              - businessName
      responses:
        '201':
          description: Business admin registered
  /auth/business/login:
    post:
      tags:
      - Auth
      summary: Login business admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
              - email
              - password
      responses:
        '200':
          description: Business admin logged in
  /auth/patron/register:
    post:
      tags:
      - Auth
      summary: Register patron
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Patron registered
  /auth/patron/login:
    post:
      tags:
      - Auth
      summary: Login patron
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
              - email
              - password
      responses:
        '200':
          description: Patron logged in
  /business:
    get:
      tags:
      - Business
      summary: Get business info (super-admin or business-admin depending on implementation)
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Business info
    put:
      tags:
      - Business
      summary: Update business info
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Business updated
  /business/staff:
    post:
      tags:
      - Staff
      summary: Create a new staff member
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Temporary password (backend may generate one)
                name:
                  type: string
                role:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                    enum:
                    - manage_admins
                    - manage_subscriptions
                    - manage_business
                    - manage_branches
                    - manage_areas
                    - manage_spaces
                    - manage_staff
                    - manage_menus
                    - manage_items
                    - manage_orders
                    - view_analytics
                    - process_payments
                branchId:
                  type: string
                  nullable: true
                schedule:
                  type: object
                  description: Schedule object or null
                status:
                  type: string
                  enum:
                  - active
                  - inactive
              required:
              - email
              - name
      responses:
        '201':
          description: Staff created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      userId:
                        type: string
                        description: Firebase uid (userRecord.uid)
                      businessId:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                      permissions:
                        type: array
                        items:
                          type: string
                          enum:
                          - manage_admins
                          - manage_subscriptions
                          - manage_business
                          - manage_branches
                          - manage_areas
                          - manage_spaces
                          - manage_staff
                          - manage_menus
                          - manage_items
                          - manage_orders
                          - view_analytics
                          - process_payments
                      branchId:
                        type: string
                        nullable: true
                      schedule:
                        type: object
                        description: Schedule object or null
                      status:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
    get:
      tags:
      - Staff
      summary: List staff members for the business
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of staff
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userId:
                          type: string
                        businessId:
                          type: string
                        name:
                          type: string
                        email:
                          type: string
                          format: email
                        role:
                          type: string
                        permissions:
                          type: array
                          items:
                            type: string
                        branchId:
                          type: string
                          nullable: true
                        schedule:
                          type: object
                        status:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
  /business/staff/{staffId}:
    parameters:
    - in: path
      name: staffId
      required: true
      schema:
        type: string
      description: Staff document id
    put:
      tags:
      - Staff
      summary: Update a staff member
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                    enum:
                    - manage_admins
                    - manage_subscriptions
                    - manage_business
                    - manage_branches
                    - manage_areas
                    - manage_spaces
                    - manage_staff
                    - manage_menus
                    - manage_items
                    - manage_orders
                    - view_analytics
                    - process_payments
                branchId:
                  type: string
                  nullable: true
                schedule:
                  type: object
                status:
                  type: string
                  enum:
                  - active
                  - inactive
      responses:
        '200':
          description: Staff updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      userId:
                        type: string
                      businessId:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                      permissions:
                        type: array
                        items:
                          type: string
                      branchId:
                        type: string
                        nullable: true
                      schedule:
                        type: object
                      status:
                        type: string
                      updatedAt:
                        type: string
                        format: date-time
  /business/branch:
    post:
      tags:
      - Branch
      summary: Add branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
                name:
                  type: string
                address:
                  type: string
              required:
              - businessId
              - name
      responses:
        '201':
          description: Branch added
    get:
      tags:
      - Branch
      summary: Get branch list
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of branches
  /business/branch/{branchId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch id
    get:
      tags:
      - Branch
      summary: Get branch by id
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Branch details
    put:
      tags:
      - Branch
      summary: Update branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
                name:
                  type: string
                address:
                  type: string
              required:
              - businessId
              - name
      responses:
        '200':
          description: Branch updated
  /business/{branchId}/areas:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch id
    post:
      tags:
      - Area
      summary: Create a new area under a branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                capacity:
                  type: integer
              required:
              - name
      responses:
        '201':
          description: Area created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      branchId:
                        type: string
                      businessId:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      capacity:
                        type: integer
                        nullable: true
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
    get:
      tags:
      - Area
      summary: Get all areas for a branch
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of areas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        branchId:
                          type: string
                        businessId:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          nullable: true
                        capacity:
                          type: integer
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
  /business/{branchId}/areas/{id}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch id
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Area id
    get:
      tags:
      - Area
      summary: Get area by id
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Area details
          content:
            application/json:
              schema:
                type: object
    put:
      tags:
      - Area
      summary: Update area
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                capacity:
                  type: integer
      responses:
        '200':
          description: Area updated
  /business/{areaId}/spaces:
    parameters:
    - in: path
      name: areaId
      required: true
      schema:
        type: string
      description: Area id
    post:
      tags:
      - Space
      summary: Create a new space within an area
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
                businessId:
                  type: string
                type:
                  type: string
                number:
                  type: string
                name:
                  type: string
                capacity:
                  type: integer
              required:
              - areaId
              - businessId
              - type
      responses:
        '201':
          description: Space created
    get:
      tags:
      - Space
      summary: Get all spaces in area
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of spaces
  /business/{areaId}/spaces/{spaceId}:
    parameters:
    - in: path
      name: areaId
      required: true
      schema:
        type: string
      description: Area id
    - in: path
      name: spaceId
      required: true
      schema:
        type: string
      description: Space id
    get:
      tags:
      - Space
      summary: Get space by ID
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Space details
    put:
      tags:
      - Space
      summary: Update space
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Space updated
    delete:
      tags:
      - Space
      summary: Delete space
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Space deleted
  /business/menus:
    post:
      tags:
      - Menu
      summary: Create menu
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Menu created
    get:
      tags:
      - Menu
      summary: Get all menus
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of menus
  /business/menus/{menuId}:
    parameters:
    - in: path
      name: menuId
      required: true
      schema:
        type: string
      description: Menu id
    get:
      tags:
      - Menu
      summary: Get menu by ID
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Menu details
    put:
      tags:
      - Menu
      summary: Update menu
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Menu updated
    delete:
      tags:
      - Menu
      summary: Delete menu
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Menu deleted
  /ordering-session/start:
    post:
      tags:
      - Ordering Session - Patron
      summary: Start or join an ordering session
      description: Start a new ordering session for a space or join an existing active session. Patron ID is extracted from
        auth token if logged in; otherwise treated as guest.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - spaceId
              properties:
                spaceId:
                  type: string
                  description: Space ID where the session is being started
                guestName:
                  type: string
                  nullable: true
                  description: Guest name (required if not authenticated)
      responses:
        '201':
          description: Session created or joined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      spaceId:
                        type: string
                      businessId:
                        type: string
                      status:
                        type: string
                      participants:
                        type: array
                        items:
                          type: object
                      orders:
                        type: array
                        items:
                          type: object
                      expiresAt:
                        type: string
                        format: date-time
                      createdAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid request - missing spaceId or authentication/guestName
  /ordering-session/{sessionId}:
    parameters:
    - in: path
      name: sessionId
      required: true
      schema:
        type: string
      description: Ordering session id
    get:
      tags:
      - OrderingSession
      summary: Get session details (auto-end check performed)
      responses:
        '200':
          description: Session info
    put:
      tags:
      - OrderingSession
      summary: Update session (e.g., metadata)
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Session updated
  /ordering-session/{sessionId}/participant:
    parameters:
    - in: path
      name: sessionId
      required: true
      schema:
        type: string
      description: Ordering session id
    post:
      tags:
      - OrderingSession
      summary: Add participant to session (patron or guest)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patronId:
                  type: string
                  nullable: true
                guestName:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Participant added
  /ordering-session/{sessionId}/end:
    parameters:
    - in: path
      name: sessionId
      required: true
      schema:
        type: string
      description: Ordering session id
    put:
      tags:
      - OrderingSession
      summary: End session manually (business)
      security:
      - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                endedBy:
                  type: string
      responses:
        '200':
          description: Session ended
  /orders:
    post:
      tags:
      - Order
      summary: Place an order (must include sessionId to link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                paymentType:
                  type: string
      responses:
        '201':
          description: Order placed
  /orders/{id}:
    parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Order id
    get:
      tags:
      - Order
      summary: Get order by ID
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Order details (items, pricing, participants)
    put:
      tags:
      - Orders - Business
      summary: Edit order details
      description: Edit order details (only allowed when order status is CONFIRMED)
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  description: Updated order items
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                        description: Menu item ID
                      name:
                        type: string
                        description: Item name
                      quantity:
                        type: integer
                        description: Updated quantity
                      variantIndex:
                        type: integer
                        description: Variant index
                      variantName:
                        type: string
                        description: Variant name
                      variantPrice:
                        type: number
                        description: Variant price
                      addOns:
                        type: array
                        description: Add-on details
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Add-on name
                            price:
                              type: number
                              description: Add-on price
                      addonsTotalPrice:
                        type: number
                        description: Total price of add-ons
                      unitPrice:
                        type: number
                        description: Unit price
                      itemTotal:
                        type: number
                        description: Total price for this item
                      notes:
                        type: string
                        description: Special instructions
                notes:
                  type: string
                  description: Order notes
                specialInstructions:
                  type: string
                  description: Special preparation instructions
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Order ID
                  orderNumber:
                    type: string
                    description: Order number
                  status:
                    type: string
                    enum:
                    - pending
                    - confirmed
                    - preparing
                    - ready
                    - served
                    - cancelled
                    - completed
                    description: Order status
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        itemId:
                          type: string
                          description: Menu item ID
                        name:
                          type: string
                          description: Item name
                        quantity:
                          type: integer
                          description: Item quantity
                        variantIndex:
                          type: integer
                          description: Variant index
                        variantName:
                          type: string
                          description: Variant name
                        variantPrice:
                          type: number
                          description: Variant price
                        addOns:
                          type: array
                          description: Add-on details
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Add-on name
                              price:
                                type: number
                                description: Add-on price
                        addonsTotalPrice:
                          type: number
                          description: Total price of add-ons
                        unitPrice:
                          type: number
                          description: Unit price
                        itemTotal:
                          type: number
                          description: Total price for this item
                        notes:
                          type: string
                          nullable: true
                          description: Special instructions
                  subtotal:
                    type: number
                    description: Order subtotal
                  taxAmount:
                    type: number
                    description: Tax amount
                  discountAmount:
                    type: number
                    description: Discount amount
                  totalAmount:
                    type: number
                    description: Total order amount
                  updatedAt:
                    type: string
                    format: date-time
                    description: Order update timestamp
        '400':
          description: Bad request - invalid order data or order not in CONFIRMED status
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
        '404':
          description: Order not found
    delete:
      tags:
      - Order
      summary: Delete order
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Order deleted
  /orders/{id}/status:
    parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Order id
    put:
      tags:
      - Orders - Business
      summary: Update order status
      description: Change the status of an order (e.g., preparing, ready, served, completed)
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - confirmed
                  - preparing
                  - ready
                  - served
                  - completed
                  - cancelled
                  - refunded
                  description: New order status
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                      updatedAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid status value
        '404':
          description: Order not found
  /orders/{id}/complete:
    parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Order id
    put:
      tags:
      - Order
