                      properties:
                        orderId:
                          type: string
                          description: Order ID
                        spaceId:
                          type: string
                          description: Space where order was placed
                        spaceName:
                          type: string
                          nullable: true
                          description: Space name
                        areaId:
                          type: string
                          nullable: true
                          description: Area ID
                        areaName:
                          type: string
                          nullable: true
                          description: Area name
                        branchId:
                          type: string
                          nullable: true
                          description: Branch ID
                        branchName:
                          type: string
                          nullable: true
                          description: Branch name
                        sessionId:
                          type: string
                          nullable: true
                          description: Ordering session ID
                        sessionUserId:
                          type: string
                          nullable: true
                          description: Session user ID
                        patronId:
                          type: string
                          nullable: true
                          description: Patron ID if authenticated
                        guestName:
                          type: string
                          nullable: true
                          description: Guest name if not authenticated
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              itemId:
                                type: string
                              name:
                                type: string
                              quantity:
                                type: number
                              unitPrice:
                                type: number
                              totalPrice:
                                type: number
                        total:
                          type: number
                          description: Order total amount
                        status:
                          type: string
                          enum:
                          - CONFIRMED
                          description: Order status
                        payment:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                              - cash
                              - card
                              - online
                            paid:
                              type: boolean
                        createdAt:
                          type: string
                          format: date-time
                          description: Order creation timestamp
                        updatedAt:
                          type: string
                          format: date-time
                          description: Order last update timestamp
                  count:
                    type: number
                    description: Total number of incoming orders
        '400':
          description: Invalid query parameters
        '401':
          description: Unauthorized - authentication required
        '403':
          description: Forbidden - insufficient permissions
        '404':
          description: Business not found
  /business/workflow/order/{branchId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch ID
    get:
      tags:
      - Workflow - Business
      summary: Get order workflow for branch
      description: Retrieve all order workflow statuses configured for a specific branch
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of workflow statuses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        color:
                          type: string
                        order:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
        '401':
          description: Unauthorized - authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Branch not found
  /business/workflow/status/{branchId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch ID
    post:
      tags:
      - Workflow - Business
      summary: Add workflow status to branch
      description: Create a new order workflow status for a specific branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - color
              properties:
                title:
                  type: string
                  description: Status title (e.g., 'Preparing', 'Ready')
                color:
                  type: string
                  description: Hex color code for status (e.g., '#FF5733')
      responses:
        '201':
          description: Workflow status created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                      color:
                        type: string
                      order:
                        type: integer
                      createdAt:
                        type: string
                        format: date-time
        '400':
          description: Missing required fields (title, color)
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Branch not found
  /business/workflow/status/{branchId}/{statusId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch ID
    - in: path
      name: statusId
      required: true
      schema:
        type: string
      description: Workflow status ID
    put:
      tags:
      - Workflow - Business
      summary: Update workflow status
      description: Update an existing order workflow status for a branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Updated status title
                color:
                  type: string
                  description: Updated hex color code
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: At least one of title or color must be provided
        '401':
          description: Unauthorized
        '404':
          description: Status or branch not found
    delete:
      tags:
      - Workflow - Business
      summary: Delete workflow status
      description: Remove an order workflow status from a branch
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Status deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Status or branch not found
  /business/workflow/reorder/{branchId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch ID
    put:
      tags:
      - Workflow - Business
      summary: Reorder workflow statuses
      description: Change the order/sequence of workflow statuses for display in a branch
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - statusIds
              properties:
                statusIds:
                  type: array
                  items:
                    type: string
                  description: Array of status IDs in desired order
      responses:
        '200':
          description: Workflow reordered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid or empty statusIds array
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Branch not found
  /business/workflow/setup-default/{branchId}:
    parameters:
    - in: path
      name: branchId
      required: true
      schema:
        type: string
      description: Branch ID
    post:
      tags:
      - Workflow - Business
      summary: Setup default 5-step workflow
      description: |
        Initialize a default 5-step workflow for a branch if no workflow exists.
        Creates the following status sequence:
        1. Incoming (Blue #3B82F6)
        2. Accepted (Purple #8B5CF6)
        3. Ready (Amber #F59E0B)
        4. Served (Green #10B981)
        5. Billing Completed (Cyan #06B6D4)
      security:
      - bearerAuth: []
      responses:
        '201':
          description: Default workflow setup successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Default workflow setup successfully
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        color:
                          type: string
                        order:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
        '400':
          description: Workflow already exists for this branch
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Branch not found
  /orders/{orderId}/workflow-status:
    put:
      tags:
      - Orders - Business
      summary: Update order workflow status
      description: Assign or change the workflow status of a confirmed order (e.g., move from Incoming to Accepted, Ready,
        Served, etc.)
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: orderId
        required: true
        schema:
          type: string
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - workflowStatus
              properties:
                workflowStatus:
                  type: string
                  description: Workflow status name (e.g., 'Incoming', 'Accepted', 'Ready', 'Served')
      responses:
        '200':
          description: Order workflow status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      orderId:
                        type: string
                        description: Order ID
                      workflowStatus:
                        type: string
                        description: Assigned workflow status name
        '400':
          description: Missing required field (workflowStatus)
        '401':
          description: Unauthorized - authentication required
        '403':
          description: Unauthorized access to order or invalid branch
        '404':
          description: Order or workflow status not found in branch workflow
  /business/items:
    post:
      tags:
      - Items - Business
      summary: Create a new menu item
      description: Create a new menu item with optional variants and addons. Addons support multiple options with individual
        pricing and min/max constraints.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - price
              properties:
                name:
                  type: string
                  description: Item name
                description:
                  type: string
                  description: Item description
                price:
                  type: number
                  description: Base price of the item
                image:
                  type: string
                  description: Image URL
                category:
                  type: string
                  description: Item category
                isVegetarian:
                  type: boolean
                  default: false
                  description: Whether item is vegetarian
                variants:
                  type: array
                  description: Optional variants with different prices
                  items:
                    type: object
                    required:
                    - name
                    - price
                    properties:
                      name:
                        type: string
                        description: Variant name (e.g., Small, Large)
                      price:
                        type: number
                        description: Price for this variant
                addons:
                  type: array
                  description: Optional addon categories with selectable options and pricing
                  items:
                    type: object
                    required:
                    - name
                    - minOptions
                    - maxOptions
                    - options
                    properties:
                      name:
                        type: string
                        description: Addon category name (e.g., Sauces, Bread Type, Cheese)
                      minOptions:
                        type: integer
                        minimum: 0
                        description: Minimum number of options customer must select from this addon
                      maxOptions:
                        type: integer
                        minimum: 1
                        description: Maximum number of options customer can select from this addon
                      options:
                        type: array
                        description: Available options for this addon category
                        items:
                          type: object
                          required:
                          - name
                          - price
                          properties:
                            name:
                              type: string
                              description: Option name (e.g., Harissa, Sweet chilli, Garlic aioli)
                            price:
                              type: number
                              description: Price of this option added to item base price
      responses:
        '201':
          description: Menu item created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Unique menu item ID
                      name:
                        type: string
                      description:
                        type: string
                      price:
                        type: number
                      image:
                        type: string
                      category:
                        type: string
                      isVegetarian:
                        type: boolean
                      variants:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            price:
                              type: number
                      addons:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            minOptions:
                              type: integer
                            maxOptions:
                              type: integer
                            options:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  price:
                                    type: number
                      status:
                        type: string
                        enum:
                        - active
                        - inactive
                      createdAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid input - name and price are required
        '401':
          description: Unauthorized - authentication required
        '403':
          description: Forbidden - insufficient permissions to manage items
  /business/items/{itemId}/addons:
    post:
      tags:
      - Items - Business
      summary: Add an addon category to an existing menu item
      description: Add a new addon category with options to an existing menu item. Addon includes min/max constraints and
        options with pricing.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: itemId
        required: true
        schema:
          type: string
        description: Menu item ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - minOptions
              - maxOptions
              - options
              properties:
                name:
                  type: string
                  description: Addon category name
                minOptions:
                  type: integer
                  minimum: 0
                maxOptions:
                  type: integer
                  minimum: 1
                options:
                  type: array
                  items:
                    type: object
                    required:
                    - name
                    - price
                    properties:
                      name:
                        type: string
                      price:
                        type: number
      responses:
        '200':
          description: Addon added and item updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      addons:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            minOptions:
                              type: integer
                            maxOptions:
                              type: integer
                            options:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  price:
                                    type: number
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Item not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase Authentication JWT token
  schemas:
    SecretPayload:
      type: object
      required:
      - name
      - ciphertext
      properties:
        name:
          type: string
          description: Identifier for the secret (e.g., 'peach_creds')
        ciphertext:
          type: string
          description: Base64/UTF-8 encoded ciphertext produced by the business; server stores ciphertext as-is
        description:
          type: string
          description: Optional human-friendly description
    SecretResponse:
      type: object
      properties:
        secret:
          type: object
          properties:
            name:
              type: string
            ciphertext:
              type: string
            description:
              type: string
    Totals:
      type: object
      properties:
        subtotal:
          type: number
          format: float
        taxes:
          type: object
          description: Tax breakdown
        total:
          type: number
          format: float
          description: Total amount (includes taxes)
    PaymentIntentRequest:
      type: object
      required:
      - orderIds
      properties:
        sessionId:
          type: string
        orderIds:
          type: array
          items:
            type: string
        currency:
          type: string
          default: INR
        payerId:
          type: string
        splits:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: string
              amount:
                type: number
        totals:
          type: object
          properties:
            subtotal:
              type: number
              format: float
            taxes:
              type: object
              description: Tax breakdown
            total:
              type: number
              format: float
              description: Total amount (includes taxes)
    PaymentIntentResponse:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        orderIds:
          type: array
          items:
            type: string
        totals:
          type: object
          properties:
            subtotal:
              type: number
              format: float
            taxes:
              type: object
              description: Tax breakdown
            total:
              type: number
              format: float
              description: Total amount (includes taxes)
        currency:
          type: string
    CardPayload:
      type: object
      required:
      - number
      - holder
      - expiryMonth
      - expiryYear
      - cvv
      properties:
        number:
          type: string
        holder:
          type: string
        expiryMonth:
          type: string
        expiryYear:
          type: string
        cvv:
          type: string
        brand:
          type: string
    SimplePurchaseRequest:
      type: object
      required:
      - transactionId
      - card
      properties:
        transactionId:
          type: string
        card:
          type: object
          required:
          - number
          - holder
          - expiryMonth
          - expiryYear
          - cvv
          properties:
            number:
              type: string
            holder:
              type: string
            expiryMonth:
              type: string
            expiryYear:
              type: string
            cvv:
              type: string
            brand:
              type: string
        clientId:
          type: string
          description: Optional client identifier to fetch per-client keys from KeyStore
    EmbeddedCheckoutRequest:
      type: object
      required:
      - transactionId
      properties:
        transactionId:
          type: string
        returnUrl:
          type: string
        clientId:
          type: string
    EmbeddedCheckoutResponse:
      type: object
      properties:
        checkout:
          type: object
          properties:
            checkoutId:
              type: string
            checkoutUrl:
              type: string
    ConfirmPaymentRequest:
      type: object
      required:
      - gatewayTransactionId
      properties:
        gatewayTransactionId:
          type: string
        clientId:
          type: string
    TransactionModel:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        payments:
          type: array
          items:
            type: object
            properties:
              amount:
                type: number
              currency:
                type: string
              method:
                type: string
              gatewayTransactionId:
                type: string
              status:
                type: string
              processedAt:
                type: string
                format: date-time
        totals:
          type: object
          properties:
            subtotal:
              type: number
              format: float
            taxes:
              type: object
              description: Tax breakdown
            total:
              type: number
              format: float
              description: Total amount (includes taxes)
